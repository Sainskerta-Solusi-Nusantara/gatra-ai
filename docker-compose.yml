version: "3.9"

services:
  gatra:
    build:
      context: .
      dockerfile: Dockerfile
    image: gatra-ai:0.1.0
    container_name: gatra-ai
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${GATRA_PORT:-7070}:7070"
    volumes:
      - gatra-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:7070/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  gatra-data:
